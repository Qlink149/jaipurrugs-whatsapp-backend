services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - ENV_MODE=${ENV_MODE}
      ssh:
        - default
    restart: always
    volumes:
      - logs:/app/logs
      - ./qlink_chatbot:/app/qlink_chatbot
    ports:
      - "8000:8000"
    environment:
      - ENV_MODE=${ENV_MODE}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MONGO_URI=${MONGO_URI}
    command: ["uvicorn", "qlink_chatbot.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/app/qlink_chatbot"]
    env_file:
      - .env

volumes:
  logs:
