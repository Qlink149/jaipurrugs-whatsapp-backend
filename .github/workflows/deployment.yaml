name: Deploy Web Backend to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build Docker image
        run: |
          export DOCKER_BUILDKIT=1
          docker build -t jr_web_backend:latest .
          docker save jr_web_backend:latest -o jr_web_backend.tar

      - name: Copy Docker image to VPS
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # master
        with:
          host: "65.20.74.206"
          username: root
          password: "3G)jy%N{?oj[m-bA"
          source: "jr_web_backend.tar"
          target: "/tmp/jr_deploy"
          rm: true

      - name: Deploy to VPS
        uses: appleboy/ssh-action@1530429296e979861824d74fb800013190b5dee0 # master
        with:
          host: "65.20.74.206"
          username: root
          password: "3G)jy%N{?oj[m-bA"
          script: |
            set -e
            docker load -i /tmp/jr_deploy/jr_web_backend.tar
            docker stop qlink_web || true
            docker rm qlink_web || true
            docker run -d \
              --name qlink_web \
              -p 8000:8000 \
              -e PYTHONUNBUFFERED=1 \
              -e PYTHONDONTWRITEBYTECODE=1 \
              -e OPENAI_API_KEY='${{ secrets.OPENAI_API_KEY }}' \
              -e MONGO_URI='${{ secrets.MONGO_URI }}' \
              -e GUPSHUP_APP_ID='${{ secrets.GUPSHUP_APP_ID }}' \
              -e GUPSHUP_TOKEN='${{ secrets.GUPSHUP_TOKEN }}' \
              -e GUPSHUP_APP_NAME='${{ secrets.GUPSHUP_APP_NAME }}' \
              -e GUPSHUP_API_KEY='${{ secrets.GUPSHUP_API_KEY }}' \
              -e GUPSHUP_SOURCE='${{ secrets.GUPSHUP_SOURCE }}' \
              -e DEFAULT_COUNTRY_CODE='${{ secrets.DEFAULT_COUNTRY_CODE }}' \
              -e ENV_MODE='${{ secrets.ENV_MODE }}' \
              -e PINECONE_API='${{ secrets.PINECONE_API }}' \
              -e R2_ACCESS_KEY='${{ secrets.R2_ACCESS_KEY }}' \
              -e R2_SECRET_KEY='${{ secrets.R2_SECRET_KEY }}' \
              -e WHAPI_TOKEN='${{ secrets.WHAPI_TOKEN }}' \
              -e WEBHOOK_API='${{ secrets.WEBHOOK_API }}' \
              -e QLINK_GUPSHUP_APP_ID='${{ secrets.QLINK_GUPSHUP_APP_ID }}' \
              -e QLINK_GUPSHUP_PARTNER_APP_TOKEN='${{ secrets.QLINK_GUPSHUP_PARTNER_APP_TOKEN }}' \
              -e QLINK_GUPSHUP_SOURCE='${{ secrets.QLINK_GUPSHUP_SOURCE }}' \
              -e QLINK_GUPSHUP_APP_NAME='${{ secrets.QLINK_GUPSHUP_APP_NAME }}' \
              -e JR_API_USERNAME='${{ secrets.JR_API_USERNAME }}' \
              -e JR_API_PASSWORD='${{ secrets.JR_API_PASSWORD }}' \
              -e JR_API_CLIENT_ID='${{ secrets.JR_API_CLIENT_ID }}' \
              -e JR_API_CLIENT_SECRET='${{ secrets.JR_API_CLIENT_SECRET }}' \
              -e CORS_ORIGINS='${{ secrets.CORS_ORIGINS }}' \
              jr_web_backend:latest

      - name: Cleanup
        uses: appleboy/ssh-action@1530429296e979861824d74fb800013190b5dee0 # master
        with:
          host: "65.20.74.206"
          username: root
          password: "3G)jy%N{?oj[m-bA"
          script: docker image prune -f
