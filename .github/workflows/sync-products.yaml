name: Hourly Product Sync

on:
  schedule:
    # Runs every hour at :00 (UTC). GitHub Actions is free and has no Vercel plan requirement.
    - cron: "0 * * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger product sync
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "${{ secrets.BACKEND_URL }}/api/cron/sync-products" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "HTTP status: $response"
          if [ "$response" -lt 200 ] || [ "$response" -ge 300 ]; then
            echo "Sync failed with status $response"
            exit 1
          fi
          echo "Product sync triggered successfully"
